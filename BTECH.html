<head>

</head>
<body>
    <h1>Integral University</h1>
    <h2>Btech Registration Form</h2>
    <form action = "five.html" method = "post">
    Name<input type ="text" name = "name" required>
    <br>
    Father Name<input type ="text" name = "fname" required>
    <br>
    Category<select>
       <option value =" ">-----Select Category-----</option>
       <option>General</option>
       <option>OBC</option>
       <option>SC/ST</option>
    </select>
    <br>
    Mother  Name<input type ="text" name = "Mname" required>
    <br>
    Phone Number<input type = "number" name = "phonenumber" required>
    <br>
    Email<input type="email" name="email" required>
    <br>
    Date of Birth<input type = "date" name = "dob" required>
    <br>
    Adhar Number<input type = "number" name = "adharnumber" required>
        <br>
    Address<Address><textarea></textarea></Address>
    <br>

    Pincode<input type = "number" name = "pincode" required>
    <br>
    Post<input type = "text" name = "post" required>
    <br>
    State<input type = "text" name = "state" required>
    <br>
    City<input type = "text" name = "city" required>
    <br>
    District<input type = "text" name = "district" required>
    <br>
    Branch<select>
        <option>Cse</option>
        <option>It</option>
        <option>Mechanical</option>
        <option>Electronic</option>
    </select>
    <input type = "submit">
    <input type = "Reset">
    </form>
