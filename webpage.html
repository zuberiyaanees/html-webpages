<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webpage</title>
    <style>
#outer{
    height:1500px;
    width:1000px;
    border:5px solid black;    
}
#header{
    height:200px;
    width:1000px;
    background-color:lightgrey;
}
#navbar{
    height:50px;
    width:1000px;
    background-color:blue;
}
#slider{
    height:300px;
    width:1000px;
    background-color:green;
}
#main{
    height:750px;
    width:1000px;
    background-color:lightcoral;
}
#left{
    height:750px;
    width:300px;
    background-color:lightseagreen;
    float:left;
}
#right{
    height:750px;
    width:700px;
    background-color:red;
    float:right;
}
#footer{
    height:200px;
    width:1000px;
    background-color:black;
}
    </style>
</head>
<body>
    <div id = "outer">
<div id = "header">
</div>
<div id = "navbar"></div>
<div id = "slider">
    
</div>
<div id = "main">
    <div id = "left"></div>
    <div id = "right"></div>
</div>
<div id="footer"></div>
    </div>
    
</body>
</html>
