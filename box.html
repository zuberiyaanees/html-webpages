<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Division section</title>
    <style>
        #outer{
            height:1000px;
            width:1000px;
            border:5px solid black;
        }
        #row1{
            height:500px;
            width:1000px;
            background-color:limegreen;
        }
        #row2{
            height:500px;
            width:1000px;
            background-color:lightseagreen;
        }
        #col1{
            height:500px;
            width:500px;
            background-color:palevioletred;
            float:left;
        }
        #col2{
            height:500px;
            width:500px;
            background-color:orange;
            float:right;
        }
        #col3{
            height:500px;
            width:500px;
            background-color:lightseagreen;
            float:left;
        }
        #col4{
            height:500px;
            width:500px;
            background-color:red;
            float:right;
        }

    </style>
</head>
<body>
    <div id = "outer">
        <div id = "row1">
            <div id = "col1" ></div>
            <div id = "col2"></div>
        </div>
        <div id = "row2">
            <div id = "col3"></div>
            <div id = "col4"></div>
        </div>
    </div>
</body>
</html>
